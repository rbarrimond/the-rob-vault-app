name: Deploy to Azure Functions

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: '3.13'
  AZURE_FUNCTIONAPP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
  PACKAGE_PATH: '.deploy'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Python ${{ env.PYTHON_VERSION }}'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Install all deps (prod + dev) for test execution only.
      # These NEVER reach the deploy artifact — tests run on a separate runner.
      - name: 'Install all dependencies for testing'
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: 'Run tests'
        run: python -m pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      HAS_OIDC: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
      HAS_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE != '' }}

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Python ${{ env.PYTHON_VERSION }}'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Build the deploy artifact: production deps only, no dev packages.
      - name: 'Build production deploy artifact'
        run: |
          python -m pip install --upgrade pip
          rm -rf .python_packages
          mkdir -p .python_packages/lib/site-packages
          pip install -r requirements.txt --target ".python_packages/lib/site-packages"

      # Validate dependency imports against .python_packages and compile the entrypoint.
      # Avoid importing function_app here because module import triggers runtime startup wiring.
      - name: 'Validate deploy artifact imports'
        run: |
          python - <<'PY'
          import sys, os
          import py_compile
          # Simulate Azure's sys.path: .python_packages first, no runner site-packages
          sys.path.insert(0, os.path.abspath(".python_packages/lib/site-packages"))
          sys.path.insert(1, os.path.abspath("."))

          py_compile.compile("function_app.py", doraise=True)

          from VaultSentinelPlatform.agent.db_agent import VaultSentinelDBAgent
          from VaultSentinelPlatform.manifest.cache import ManifestCache
          from VaultSentinelPlatform.manifest.identity import race_name_to_hash
          from VaultSentinelPlatform.api.http_utils import json_http_response

          print("✅ Deploy artifact import smoke check passed")
          print(VaultSentinelDBAgent.__name__, ManifestCache.__name__, race_name_to_hash.__name__, json_http_response.__name__)
          PY

      # Create a minimal, deterministic deployment payload.
      # This avoids shipping repo-only files (docs/tests/admin/.github) to Azure.
      - name: 'Assemble curated deploy package'
        run: |
          rm -rf .deploy
          mkdir -p .deploy
          cp function_app.py host.json requirements.txt .deploy/
          cp -R VaultSentinelPlatform .deploy/
          cp -R static .deploy/
          cp -R .python_packages .deploy/
          echo "✅ Curated package contents:"
          find .deploy -mindepth 1 -maxdepth 2 | sort

      - name: 'Validate deployment authentication configuration'
        run: |
          if [[ -z "${AZURE_FUNCTIONAPP_NAME}" ]]; then
            echo "❌ Missing AZURE_FUNCTIONAPP_NAME secret."
            exit 1
          fi

          if [[ "${HAS_OIDC}" != "true" && "${HAS_PUBLISH_PROFILE}" != "true" ]]; then
            echo "❌ Missing deployment auth. Configure OIDC (AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID) or AZURE_FUNCTIONAPP_PUBLISH_PROFILE."
            exit 1
          fi

      - name: 'Azure login (OIDC)'
        if: env.HAS_OIDC == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: 'Verify Function App target exists (OIDC)'
        if: env.HAS_OIDC == 'true'
        run: |
          az functionapp show --name "${AZURE_FUNCTIONAPP_NAME}" --query name -o tsv >/dev/null
          echo "✅ Verified deploy target exists: ${AZURE_FUNCTIONAPP_NAME}"

      - name: 'Deploy to Azure Functions (OIDC)'
        if: env.HAS_OIDC == 'true'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PACKAGE_PATH }}
          respect-funcignore: true
          scm-do-build-during-deployment: false
          enable-oryx-build: false

      - name: 'Deploy to Azure Functions (Publish Profile fallback)'
        if: env.HAS_OIDC != 'true'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
          scm-do-build-during-deployment: false
          enable-oryx-build: false

      - name: 'Deploy summary'
        run: |
          echo "✅ Deployment completed successfully"
          echo "📦 Package deployed to ${{ env.AZURE_FUNCTIONAPP_NAME }}"
          if [[ "${HAS_OIDC}" == "true" ]]; then
            echo "🔐 Auth mode: OIDC"
          else
            echo "🔐 Auth mode: Publish Profile (fallback)"
          fi


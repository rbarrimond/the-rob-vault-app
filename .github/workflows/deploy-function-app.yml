name: Deploy to Azure Functions

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'
  AZURE_FUNCTIONAPP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
  PACKAGE_PATH: '.'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Python ${{ env.PYTHON_VERSION }}'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Install all deps (prod + dev) for test execution only.
      # These NEVER reach the deploy artifact — tests run on a separate runner.
      - name: 'Install all dependencies for testing'
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: 'Run tests'
        run: python -m pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Python ${{ env.PYTHON_VERSION }}'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Build the deploy artifact: production deps only, no dev packages.
      - name: 'Build production deploy artifact'
        run: |
          python -m pip install --upgrade pip
          rm -rf .python_packages
          mkdir -p .python_packages/lib/site-packages
          pip install -r requirements.txt --target ".python_packages/lib/site-packages"

      # Validate imports against .python_packages — the exact path Azure uses.
      # This catches missing packages before deploy, not after cold start.
      - name: 'Validate deploy artifact imports'
        run: |
          python - <<'PY'
          import sys, os
          # Simulate Azure's sys.path: .python_packages first, no runner site-packages
          sys.path.insert(0, os.path.abspath(".python_packages/lib/site-packages"))
          sys.path.insert(1, os.path.abspath("."))

          import function_app
          from VaultSentinelPlatform.agent.db_agent import VaultSentinelDBAgent
          from VaultSentinelPlatform.manifest.cache import ManifestCache
          from VaultSentinelPlatform.manifest.identity import race_name_to_hash

          print("✅ Deploy artifact import smoke check passed")
          print(function_app.app)
          print(VaultSentinelDBAgent.__name__, ManifestCache.__name__)
          PY

      # Wipe wwwroot before deploy so stale files from prior deployments don't accumulate.
      # Required because WEBSITE_RUN_FROM_PACKAGE=0 extracts the zip into wwwroot in-place
      # without first removing files that no longer exist in the new package.
      - name: 'Clean stale wwwroot artifacts via Kudu'
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          python - <<'PY'
          import os, re, base64, urllib.request, json

          profile = os.environ["PUBLISH_PROFILE"]

          # Parse Kudu credentials from the MSDeploy publish profile entry
          url_match  = re.search(r'publishUrl="([^"]*\.scm\.azurewebsites\.net[^"]*)"', profile)
          user_match = re.search(r'userName="(\$[^"]+)"', profile)
          pwd_match  = re.search(r'userPWD="([^"]+)"', profile)

          if not (url_match and user_match and pwd_match):
              raise RuntimeError("Could not parse Kudu credentials from publish profile")

          scm_host = url_match.group(1).split(":")[0]   # strip port if present
          username = user_match.group(1)
          password = pwd_match.group(1)

          creds   = base64.b64encode(f"{username}:{password}".encode()).decode()
          headers = {"Authorization": f"Basic {creds}", "Content-Type": "application/json"}

          payload = json.dumps({
              "command": "rm -rf /home/site/wwwroot/* /home/site/wwwroot/.[!.]* /home/site/wwwroot/..?*",
              "dir": "/",
          }).encode()
          req = urllib.request.Request(
              f"https://{scm_host}/api/command",
              data=payload, headers=headers, method="POST",
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())

          if result.get("ExitCode", 0) != 0:
              raise RuntimeError(f"Kudu wwwroot clean failed: {result.get('Error', '').strip()}")

          verify_payload = json.dumps({
              "command": "find /home/site/wwwroot -mindepth 1 -maxdepth 1 -print",
              "dir": "/",
          }).encode()
          verify_req = urllib.request.Request(
              f"https://{scm_host}/api/command",
              data=verify_payload, headers=headers, method="POST",
          )
          with urllib.request.urlopen(verify_req) as resp:
              verify = json.loads(resp.read())

          if verify.get("ExitCode", 0) != 0:
              raise RuntimeError(f"Kudu wwwroot verification failed: {verify.get('Error', '').strip()}")

          leftovers = [line.strip() for line in verify.get("Output", "").splitlines() if line.strip()]
          allowed_leftovers = {".python_packages"}
          unexpected_leftovers = [
              path for path in leftovers
              if os.path.basename(path) not in allowed_leftovers
          ]
          if unexpected_leftovers:
              raise RuntimeError(
                  f"Kudu wwwroot has unexpected leftovers after clean: {', '.join(unexpected_leftovers)}"
              )

          print("✅ wwwroot cleaned — stale artifacts removed")
          if result.get("Output"):
              print(result["Output"].strip())
          PY

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
          scm-do-build-during-deployment: false
          enable-oryx-build: false

      - name: 'Deploy summary'
        run: |
          echo "✅ Deployment completed successfully"
          echo "📦 Package deployed to ${{ env.AZURE_FUNCTIONAPP_NAME }}"


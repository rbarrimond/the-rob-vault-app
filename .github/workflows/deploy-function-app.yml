name: Deploy to Azure Functions

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  AZURE_FUNCTIONAPP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
  PACKAGE_PATH: '.'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      # Python setup is needed here only for running tests in CI.
      # Azure performs the deployment build during publish using Oryx.
      - name: 'Setup Python ${{ env.PYTHON_VERSION }}'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 'Install dependencies'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 'Install test dependencies'
        run: pip install -r requirements.local

      - name: 'Run tests'
        run: python -m pytest tests/ -v

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      - name: 'Deployment summary'
        run: |
          echo "✅ Deployment completed successfully"
          echo "📦 Package deployed to ${{ env.AZURE_FUNCTIONAPP_NAME }}"


name: Deploy to Azure Functions

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  AZURE_FUNCTIONAPP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
  PACKAGE_PATH: '.'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      # Python setup is needed for both CI validation and building the deployable artifact.
      # Dependencies are packaged in CI so Azure receives a deterministic publish payload.
      - name: 'Setup Python ${{ env.PYTHON_VERSION }}'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 'Build deployment dependencies'
        run: |
          python -m pip install --upgrade pip
          rm -rf .python_packages
          mkdir -p .python_packages/lib/site-packages
          pip install -r requirements.txt --target ".python_packages/lib/site-packages"

      - name: 'Install app and test dependencies'
        run: pip install ".[dev]"

      - name: 'Validate Azure Function imports'
        run: |
          python - <<'PY'
          import function_app
          from VaultSentinelPlatform.agent.db_agent import VaultSentinelDBAgent
          from VaultSentinelPlatform.manifest.cache import ManifestCache

          print("✅ Azure Function import smoke check passed")
          print(function_app.app)
          print(VaultSentinelDBAgent.__name__, ManifestCache.__name__)
          PY

      - name: 'Run tests'
        run: python -m pytest tests/ -v

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
          scm-do-build-during-deployment: false
          enable-oryx-build: false

      - name: 'Deployment summary'
        run: |
          echo "✅ Deployment completed successfully"
          echo "📦 Package deployed to ${{ env.AZURE_FUNCTIONAPP_NAME }}"

